# Prometheus scrape config for the benchmark stack.
# Targets use docker-compose service names (same default network).
global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]

  - job_name: triton
    metrics_path: /metrics
    static_configs:
      - targets: ["triton:8002"]

  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm:8000"]

  - job_name: tgi
    metrics_path: /metrics
    static_configs:
      - targets: ["tgi:80"]
